syntax = "proto3";

import "common.proto";

package beancount;

// Top-level directive container
message Directive {
  oneof directive_type {
    Transaction transaction = 1;
    Balance balance = 2;
    Open open = 3;
    Close close = 4;
    Commodity commodity = 5;
    Pad pad = 6;
    Note note = 7;
    Document document = 8;
    Price price = 9;
    Event event = 10;
    Query query = 11;
    Custom custom = 12;
  }
}

// Transaction directive with postings
message Transaction {
  Date date = 1;
  optional string flag = 2;  // "*" (cleared) or "!" (pending)
  optional string payee = 3;
  string narration = 4;
  repeated string tags = 5;
  repeated string links = 6;
  repeated Posting postings = 7;
  Metadata metadata = 8;
  Location location = 9;
}

// Individual posting within a transaction
message Posting {
  string account = 1;
  optional Amount amount = 2;  // Can be null for auto-balanced postings
  optional Amount cost = 3;    // Cost specification
  optional Amount price = 4;   // Price annotation
  optional string flag = 5;    // Posting-level flag
  Metadata metadata = 6;
}

// Balance assertion directive
message Balance {
  Date date = 1;
  string account = 2;
  Amount amount = 3;
  optional Amount tolerance = 4;
  Metadata metadata = 5;
  Location location = 6;
}

// Open account directive
message Open {
  Date date = 1;
  string account = 2;
  repeated string currencies = 3;  // Allowed currencies
  optional string booking_method = 4;  // FIFO, LIFO, etc.
  Metadata metadata = 5;
  Location location = 6;
}

// Close account directive
message Close {
  Date date = 1;
  string account = 2;
  Metadata metadata = 3;
  Location location = 4;
}

// Commodity declaration
message Commodity {
  Date date = 1;
  string currency = 2;
  Metadata metadata = 3;
  Location location = 4;
}

// Pad directive for auto-balancing
message Pad {
  Date date = 1;
  string account = 2;
  string source_account = 3;
  Metadata metadata = 4;
  Location location = 5;
}

// Note attached to account
message Note {
  Date date = 1;
  string account = 2;
  string comment = 3;
  Metadata metadata = 4;
  Location location = 5;
}

// Document attachment
message Document {
  Date date = 1;
  string account = 2;
  string path = 3;
  repeated string tags = 4;
  Metadata metadata = 5;
  Location location = 6;
}

// Price directive
message Price {
  Date date = 1;
  string currency = 2;
  Amount amount = 3;
  Metadata metadata = 4;
  Location location = 5;
}

// Event directive
message Event {
  Date date = 1;
  string type = 2;
  string description = 3;
  Metadata metadata = 4;
  Location location = 5;
}

// Query directive
message Query {
  Date date = 1;
  string name = 2;
  string query_string = 3;
  Metadata metadata = 4;
  Location location = 5;
}

// Custom directive (extensible)
message Custom {
  Date date = 1;
  string type = 2;
  repeated CustomValue values = 3;
  Metadata metadata = 4;
  Location location = 5;
}

// Value in custom directive
message CustomValue {
  oneof value {
    string string_value = 1;
    Amount amount_value = 2;
    Date date_value = 3;
    bool bool_value = 4;
    string account_value = 5;
  }
}
